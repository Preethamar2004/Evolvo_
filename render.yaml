databases:
  - name: evolvo-db
    plan: free

services:
  - type: web
    name: evolvo-api
    env: python
    region: ohio
    plan: free
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: |
      cd backend
      uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: evolvo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: "https://your-frontend-domain.vercel.app"
      - key: GROQ_API_KEY
        sync: false # You will enter this manually in the Render dashboard
